spring:
  jackson:
    default-property-inclusion: non_null
  web:
    resources:
      #控制api文档访问, smart-doc生成的html静态api文档，生产服务器不需要暴露文档
      add-mappings: off
  #开发环境启用thymeleaf的缓存
  thymeleaf:
    cache: on
  #nacos server
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  #使用spring session redis存储session信息
  session:
    store-type: redis
    timeout: 30m
  redis:
    database: 0
    host: 192.168.40.132
    port: 6379
    password: 123456
    timeout: 6000ms
