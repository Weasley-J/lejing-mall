spring:
  web:
    resources:
      #控制api文档访问, smart-doc生成的html静态api文档
      add-mappings: on
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.40.132:3306/lejing_pms?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
  #测试环境禁用thymeleaf的缓存
  thymeleaf:
    cache: off
  #redis配置
  redis:
    host: 192.168.226.129
    port: 6379
    password: 123456
    client-name: LEJING_REDIS
    # Redisson settings
    # Tips:
    #     Use Redisson through spring bean with RedissonClient interface or RedisTemplate/ReactiveRedisTemplate objects
    # path to config - redisson.yml
